name: Reusable Type Check

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: .

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then
            bun install
          else
            echo "No package.json found; skipping install"
          fi

      - name: Run type-check (if script exists)
        run: |
          if [ -f package.json ] && node -e "const p=require('./package.json'); process.exit(p.scripts && (p.scripts['type-check'] || p.scripts.typecheck) ? 0 : 1)"; then
            if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['type-check'] ? 0 : 1)"; then
              bun run type-check
            else
              bun run typecheck
            fi
          else
            echo "No type-check script found; skipping"
          fi
